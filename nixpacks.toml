[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m pip install --upgrade pip",
  "python3 -m pip install -r backend/requirements.txt",
  "cd poker-platform && npm install"
]

[phases.build]
cmds = [
  "cd poker-platform && npm run build"
]

[start]
cmd = "cd backend && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
