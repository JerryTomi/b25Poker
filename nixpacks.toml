[phases.setup]
# Use python311 to ensure maximum compatibility with pre-built wheels for web3 and psycopg2
# Include gcc so any C-extensions can compile successfully
nixPkgs = ["python311", "gcc", "nodejs_20"]

[phases.install]
cmds = [
  # Create a virtual environment
  "python -m venv /opt/venv",
  
  # Activate the venv and install Python dependencies
  ". /opt/venv/bin/activate && pip install -r backend/requirements.txt",
  
  # Install Node dependencies
  "npm install --include=dev --prefix poker-platform"
]

[phases.build]
cmds = [
  # Build the frontend
  "npm run build --prefix poker-platform",
  "mkdir -p backend/static",
  "cp -R poker-platform/dist/* backend/static/"
]

[start]
# Activate the venv before starting the server
cmd = ". /opt/venv/bin/activate && cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"