[phases.setup]
nixPkgs = ["python311", "nodejs_20", "npm-9_x"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "cd poker-platform && npm install"
]

[phases.build]
cmds = [
  "cd poker-platform && npm run build"
]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
